name: ktlint

# Non-gating formatting check: runs ktlint via the Gradle plugin (same tool/version as
# local `./gradlew ktlintCheck`), then posts findings as PR comments on changed lines via
# reviewdog. Format locally with `./gradlew ktlintFormat`. Never fails the build.
on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint
        continue-on-error: true
        run: ./gradlew ktlintCheck --continue

      # The plugin's SARIF uses %SRCROOT% (home) + home-relative paths; rewrite to repo-relative
      # so reviewdog can map findings onto the PR diff, and merge every module's report into one.
      - name: Merge + normalize SARIF
        if: always()
        run: |
          python3 - <<'PY'
          import json, glob, os
          runs = []
          for f in glob.glob('**/build/reports/ktlint/**/*.sarif', recursive=True):
              try:
                  data = json.load(open(f))
              except Exception:
                  continue
              for run in data.get('runs', []):
                  bases = run.get('originalUriBaseIds', {})
                  for res in run.get('results', []):
                      for loc in res.get('locations', []):
                          pl = loc.get('physicalLocation', {}).get('artifactLocation', {})
                          uri, bid = pl.get('uri'), pl.get('uriBaseId')
                          if uri and bid and bid in bases:
                              base = bases[bid]['uri'].replace('file://', '')
                              pl['uri'] = os.path.relpath(os.path.join(base, uri), os.getcwd())
                              pl.pop('uriBaseId', None)
                  run.pop('originalUriBaseIds', None)
                  runs.append(run)
          json.dump(
              {"version": "2.1.0", "$schema": "https://json.schemastore.org/sarif-2.1.0.json", "runs": runs},
              open('ktlint.sarif', 'w'),
          )
          print(f"ktlint: merged {len(runs)} run(s)")
          PY

      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1

      - name: Report findings on PR
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=sarif -name=ktlint \
            -reporter=github-pr-review \
            -filter-mode=added \
            -level=warning \
            -fail-on-error=false \
            < ktlint.sarif
