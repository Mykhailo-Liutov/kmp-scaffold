name: Android

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleProdDebug

      # Same job, same workspace: reuses the classes compiled by assembleProdDebug above.
      # testAndroidHostTest: JVM-host tests for every KMP module. testProdDebugUnitTest: the
      # androidApp module (flavored — there is no plain testDebugUnitTest task).
      - name: Run unit tests
        run: ./gradlew testAndroidHostTest testProdDebugUnitTest
