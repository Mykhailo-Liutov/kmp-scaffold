name: iOS Build

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: Build iOS (simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      # Needed even for the iOS build: the shared module configures its Android target during project sync.
      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      # The .xcodeproj is gitignored; xcodegen regenerates it from iosApp/project.yml.
      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate
        working-directory: iosApp

      # Builds for the simulator (no device/signing). The scheme's pre-build script invokes
      # ./gradlew :shared:embedAndSignAppleFrameworkForXcode, which needs the JDK above.
      # ARCHS=arm64 pins a concrete arch; a generic simulator destination leaves it unset and
      # syncComposeResourcesForIos then fails to resolve its target ("no value available").
      - name: Build for iOS simulator
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild build \
            -project AcmeApp.xcodeproj \
            -scheme AcmeApp-prod \
            -configuration Debug-prod \
            -sdk iphonesimulator \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO
