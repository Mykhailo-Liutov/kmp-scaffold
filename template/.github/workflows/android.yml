name: Android

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleProdDebug

      # Same job, same workspace: reuses the classes compiled by assembleProdDebug above.
      # testAndroidHostTest: JVM-host tests for every KMP module. testProdDebugUnitTest: the
      # androidApp module (flavored — there is no plain testDebugUnitTest task).
      - name: Run unit tests
        run: ./gradlew testAndroidHostTest testProdDebugUnitTest
