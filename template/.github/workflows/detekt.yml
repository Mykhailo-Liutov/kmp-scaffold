name: detekt

# Non-gating code-quality check: runs detekt and posts findings as PR comments on
# the changed lines via reviewdog. Never fails the build
on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detekt:
    name: detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        continue-on-error: true
        run: ./gradlew detekt reportMerge

      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1

      - name: Report findings on PR
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=sarif -name=detekt \
            -reporter=github-pr-review \
            -filter-mode=added \
            -level=warning \
            -fail-on-error=false \
            < build/reports/detekt/merged.sarif
